apiVersion: v1
kind: ServiceAccount
metadata:
  name: rosenvall-devops-api
  namespace: rosenvall-devops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rosenvall-devops-api
rules:
  - apiGroups: [""]
    resources: ["namespaces", "configmaps", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rosenvall-devops-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rosenvall-devops-api
subjects:
  - kind: ServiceAccount
    name: rosenvall-devops-api
    namespace: rosenvall-devops
