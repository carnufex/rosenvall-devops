name: Publish images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/carnufex/rosenvall-devops

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Rosenvall.DevOps.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:main
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_AUTH_ENABLED=true
            VITE_AUTH_AUTHORITY=https://authentik.rosenvall.se/application/o/rosenvall-devops/
            VITE_AUTH_CLIENT_ID=rosenvall-devops
            VITE_AUTH_REDIRECT_URI=https://devops.rosenvall.se/auth/callback
            VITE_AUTH_POST_LOGOUT_REDIRECT_URI=https://devops.rosenvall.se/
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:main
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
