name: Rosenvall DevOps AI Implementation

on:
  workflow_dispatch:
    inputs:
      work_item_id:
        required: true
        type: string
      branch_slug:
        required: true
        type: string
      callback_url:
        required: true
        type: string
      context_bundle_url:
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create implementation branch
        run: |
          git switch -c "feat/${{ inputs.branch_slug }}"

      - name: Run implementation agent
        run: |
          echo "TODO: invoke configured Codex/Claude/Copilot/Gemini adapter with context bundle"
          echo "Work item: ${{ inputs.work_item_id }}"

      - name: Push branch
        run: |
          git push --set-upstream origin "feat/${{ inputs.branch_slug }}"

      - name: Create pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(gh pr create --title "Implement ${{ inputs.work_item_id }}" --body "Generated by Rosenvall DevOps AI workflow." --base main --head "feat/${{ inputs.branch_slug }}")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Report result to Rosenvall DevOps
        if: always()
        run: |
          curl -fsS -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d @- <<JSON
          {
            "workItemId": "${{ inputs.work_item_id }}",
            "repository": "${{ github.repository }}",
            "branch": "feat/${{ inputs.branch_slug }}",
            "pullRequestUrl": "${{ steps.pr.outputs.url }}",
            "image": "ghcr.io/${{ github.repository }}:${{ inputs.branch_slug }}",
            "checksStatus": "${{ job.status }}"
          }
          JSON
